<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 840" role="img" aria-labelledby="title desc">
  <title id="title">Musikala Studio visual</title>
  <desc id="desc">Music studio scheduler with room slots, gear board, and recording controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/>
      <stop offset="0.6" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="840" fill="url(#bg)"/>
  <circle cx="734" cy="126" r="136" fill="#db2777" opacity=".14"/>
  <circle cx="138" cy="706" r="184" fill="#4f46e5" opacity=".12"/>
  <g transform="translate(98 110)">
    <rect width="500" height="546" rx="40" fill="#ffffff" stroke="#fbcfe8" stroke-width="3"/>
    <text x="42" y="68" fill="#db2777" font-family="Arial, sans-serif" font-size="30" font-weight="900">Studio scheduler</text>
    <rect x="44" y="116" width="410" height="76" rx="22" fill="#fdf2f8"/>
    <rect x="44" y="220" width="410" height="76" rx="22" fill="#eef2ff"/>
    <rect x="44" y="324" width="410" height="76" rx="22" fill="#fdf2f8"/>
    <text x="78" y="164" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="900">19.00 Room A</text>
    <text x="78" y="268" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="900">21.00 Recording</text>
    <text x="78" y="372" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="900">Podcast room</text>
    <rect x="44" y="452" width="154" height="28" rx="14" fill="#db2777" opacity=".82"/>
    <rect x="220" y="452" width="116" height="28" rx="14" fill="#4f46e5" opacity=".72"/>
  </g>
  <g transform="translate(640 210)">
    <rect width="160" height="320" rx="30" fill="#ffffff" stroke="#fbcfe8" stroke-width="3"/>
    <circle cx="80" cy="104" r="52" fill="#fdf2f8" stroke="#db2777" stroke-width="10"/>
    <circle cx="80" cy="104" r="14" fill="#db2777"/>
    <rect x="46" y="198" width="68" height="86" rx="18" fill="#4f46e5" opacity=".78"/>
    <rect x="64" y="176" width="32" height="44" rx="16" fill="#db2777"/>
